<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APL — PLAYGROUND</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="./style.css">
</head>
<body class="repl">
  <header>
    <div class="brand"><span class="mark">⎕</span>APL<b>·</b>PLAYGROUND</div>
    <div class="status"><a class="navlink" href="./learn.html">LEARN →</a><span><span class="dot" id="dot"></span><b id="statustxt">BOOTING ENGINE</b></span></div>
  </header>
  <main>
    <section class="col left">
      <div class="label">[ EDITOR ]<span class="hint">PREFIX <span class="prefix" id="prefbox">`</span> + KEY → GLYPH</span></div>
      <div class="editwrap">
        <div class="filebar">
          <select id="filepick" aria-label="Saved files"></select>
          <input id="filename" aria-label="File name" spellcheck="false" autocomplete="off">
          <button id="newfile" class="iconbtn" title="New file" aria-label="New file">＋</button>
          <button id="savefile" class="iconbtn" title="Save file (Ctrl+S)" aria-label="Save file">▣</button>
          <button id="downloadfile" class="iconbtn" title="Download .apl" aria-label="Download .apl">⇩</button>
          <button id="deletefile" class="iconbtn" title="Delete file" aria-label="Delete file">×</button>
        </div>
        <textarea id="src" spellcheck="false" autocomplete="off" autocapitalize="off">2 3⍴⍳6
+/⍳100
mean ← {(+/⍵)÷≢⍵}
mean ⍳100
(⍳5) ∘.× ⍳5</textarea>
        <div class="toolbar">
          <button id="run">▸ Run &nbsp;(Ctrl·↵)</button>
          <button id="share">Share link</button>
          <button id="clear">Clear session</button>
        </div>
      </div>
      <div class="keys-wrap">
        <div id="kbmount"></div>
      </div>
    </section>
    <section class="col right">
      <div class="label">[ SESSION ]<span class="hint"><label class="persist"><input type="checkbox" id="persist"> persist session</label></span></div>
      <div id="out"><span class="ghost">Engine starting. Output appears here.</span></div>
    </section>
  </main>
  <script type="module" src="./repl.js"></script>
</body>
</html>
